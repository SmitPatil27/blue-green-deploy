apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-app-blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: python-app
      slot: blue
  template:
    metadata:
      labels:
        app: python-app
        slot: blue
    spec:
      containers:
      - name: python-app
        image: YOUR_DOCKERHUB_USERNAME/blue-green:BLUE_TAG
        ports:
        - containerPort: 5000
        env:
        - name: SLOT
          value: "blue"
